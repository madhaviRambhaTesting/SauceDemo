[pytest]
# ===========================================================================
# pytest.ini — TC-96: Forgot Password Link Visibility
# Repository : madhaviRambhaTesting/SauceDemo
# Branch     : qtestidscript
# ===========================================================================

# --- Test discovery --------------------------------------------------------
testpaths        = tests
python_files     = test_*.py
python_classes   = Test*
python_functions = test_*

# --- HTML report -----------------------------------------------------------
addopts =
    --html=reports/pytest_script.html
    --self-contained-html
    --tb=short
    -v
    --strict-markers

# --- Custom markers --------------------------------------------------------
markers =
    tc96:             TC-96 — Forgot Password Link Visibility (QTest: 11194308)
    forgot_password:  Tests related to the 'Forgot Password' feature
    high_priority:    High-priority test cases (must pass before release)
    smoke:            Smoke / sanity tests
    regression:       Full regression suite tests

# --- Logging ---------------------------------------------------------------
log_cli          = true
log_cli_level    = INFO
log_cli_format   = %(asctime)s | %(levelname)-8s | %(name)-35s | %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

log_file         = logs/pytest.log
log_file_level   = DEBUG
log_file_format  = %(asctime)s | %(levelname)-8s | %(name)-35s | %(message)s
log_file_date_format = %Y-%m-%d %H:%M:%S

# --- Timeouts / warnings ---------------------------------------------------
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
