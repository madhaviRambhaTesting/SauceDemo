[pytest]
# ──────────────────────────────────────────────────────────────────────────────
# pytest.ini — TC-96 Pytest Configuration
# Test Case  : Forgot Password Link is Visible on the Login Page
# QTest ID   : 11194308
# Requirement: SAUC-7 — Allow Users to Reset Their Password
# ──────────────────────────────────────────────────────────────────────────────

# ── Test Discovery ────────────────────────────────────────────────────────────
testpaths     = tests
python_files  = test_*.py
python_classes= Test*
python_functions = test_*

# ── HTML Report ───────────────────────────────────────────────────────────────
addopts =
    --html=reports/pytest_script.html
    --self-contained-html
    --tb=short
    -v

# ── Logging ───────────────────────────────────────────────────────────────────
log_cli            = true
log_cli_level      = INFO
log_cli_format     = %(asctime)s | %(levelname)-8s | %(name)s | %(message)s
log_cli_date_format= %Y-%m-%d %H:%M:%S

log_file            = reports/logs/pytest.log
log_file_level      = DEBUG
log_file_format     = %(asctime)s | %(levelname)-8s | %(name)s | %(message)s
log_file_date_format= %Y-%m-%d %H:%M:%S

# ── Markers ───────────────────────────────────────────────────────────────────
markers =
    tc96:         TC-96 — Forgot Password Link is Visible on the Login Page
    high_priority: High priority test cases
    sauc7:        Tests linked to requirement SAUC-7 (Password Reset)
    step1:        Step 1 — Login page navigation and display
    step2:        Step 2 — Forgot Password link visibility check
    step3:        Step 3 — Forgot Password link click and navigation
    full_flow:    Full end-to-end test flow

# ── Timeouts & Warnings ───────────────────────────────────────────────────────
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
