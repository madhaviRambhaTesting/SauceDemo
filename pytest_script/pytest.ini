[pytest]
# ──────────────────────────────────────────────
#  pytest configuration for TC-83 test suite
#  TC-83: Successful Login with Valid Username and Password
#  Credentials: standard_user / secret_sauce (validdata.xlsx)
# ──────────────────────────────────────────────

# Default options applied to every pytest run
addopts =
    --html=reports/pytest_script.html
    --self-contained-html
    -v
    --tb=short

# Test file discovery pattern
testpaths = tests

# Register custom markers (avoids PytestUnknownMarkWarning)
markers =
    smoke: End-to-end smoke tests (full TC-83 login flow)
    regression: Full regression suite
    ui: UI / front-end tests

# Logging
log_cli            = true
log_cli_level      = INFO
log_cli_format     = %(asctime)s | %(levelname)-8s | %(name)s | %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

# Minimum pytest version required
minversion = 7.0
