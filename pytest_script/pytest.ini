[pytest]
# ═══════════════════════════════════════════════════════════════════════
#  pytest.ini — TC-83 Pytest Configuration
#  TC-83: Successful Login with Valid Username and Password
#  QTest ID: 11194292  |  Priority: High
#
#  Parameterized Users (validdata.xlsx):
#    standard_user, problem_user, performance_glitch_user,
#    error_user, visual_user
#    (locked_out_user EXCLUDED — Invaliddata.xlsx)
#
#  Execution:
#    pytest tests/test_tc83_login.py -v
#          --html=reports/pytest_script.html
#          --self-contained-html
#          --tb=short
#
#  Expected Results:
#    9 passed (4 step-tests + 5 parametrized + 1 smoke — minus overlaps)
#    HTML Report: reports/pytest_script.html
#    Screenshots: reports/screenshots/ (auto-captured on failure only)
# ═══════════════════════════════════════════════════════════════════════

# Default options applied to every pytest run
addopts =
    --html=reports/pytest_script.html
    --self-contained-html
    -v
    --tb=short

# Test file discovery root
testpaths = tests

# Register custom markers (avoids PytestUnknownMarkWarning)
markers =
    smoke:      End-to-end smoke tests covering full TC-83 login flow (Steps 1-4)
    regression: Full regression suite including all user scenarios
    ui:         UI / front-end browser tests
    parametrize: Parameterized multi-user tests from validdata.xlsx

# CLI logging configuration
log_cli             = true
log_cli_level       = INFO
log_cli_format      = %(asctime)s | %(levelname)-8s | %(name)s | %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

# Minimum pytest version required
minversion = 7.0
