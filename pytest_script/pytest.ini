[pytest]
# ─────────────────────────────────────────────────────────────────────────────
#  pytest.ini — TC-83 | Successful Login with Valid Username and Password
#  QTest: TC-83  |  Priority: High  |  Linked: SAUC-3
#  Target: https://www.saucedemo.com/
# ─────────────────────────────────────────────────────────────────────────────

# Default options applied to every pytest run
addopts =
    --html=reports/pytest_script.html
    --self-contained-html
    -v
    --tb=short
    --capture=sys

# Test file discovery pattern
testpaths = tests

# Test naming pattern
python_files  = test_*.py
python_classes = Test*
python_functions = test_*

# Register custom markers (avoids PytestUnknownMarkWarning)
markers =
    smoke:      Full E2E TC-83 login flow (Steps 1–4 combined)
    regression: Full regression suite
    ui:         UI / front-end Selenium tests

# CLI Logging (visible in terminal output per test)
log_cli             = true
log_cli_level       = INFO
log_cli_format      = %(asctime)s | %(levelname)-8s | %(name)s | %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

# File Logging
log_file             = logs/tc83_test_run.log
log_file_level       = DEBUG
log_file_format      = %(asctime)s | %(levelname)-8s | %(name)s | %(message)s
log_file_date_format = %Y-%m-%d %H:%M:%S

# Minimum pytest version required
minversion = 7.0
