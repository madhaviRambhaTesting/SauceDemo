# Default options applied to every pytest run
addopts =
    --html=reports/pytest_script.html
    --self-contained-html
    -v
    --tb=short

# Test file discovery root
testpaths = tests

# Register custom markers (avoids PytestUnknownMarkWarning)
markers =
    smoke:       End-to-end smoke test covering full TC-83 login flow (Steps 1–4)
    regression:  Full regression suite including all parameterized user scenarios
    ui:          UI / front-end browser tests
    parametrize: Parameterized multi-user tests from validdata (1).xlsx

# CLI logging configuration
log_cli             = true
log_cli_level       = INFO
log_cli_format      = %(asctime)s | %(levelname)-8s | %(name)s | %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

# Minimum pytest version required
minversion = 7.0
